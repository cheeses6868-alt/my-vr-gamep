<!DOCTYPE html>
<html>
  <head>
    <title>My First VR Game</title>
    <script src="https://cloudflare.com" crossorigin="anonymous"></script>
  </head>
  <body>
    <a-scene embedded="true">
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#FF0000"></a-box>

    </a-scene>
  </body>
</html>
